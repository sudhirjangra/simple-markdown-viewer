name: Build Windows Release

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a version tag (e.g., v1.0.0)

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyQt6-WebEngine Markdown pyinstaller
          
      - name: Build Windows EXE
        run: pyinstaller --noconsole --onefile --name "MarkdownViewer-Windows" app.py
        
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MarkdownViewer-Windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
