name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyQt6-WebEngine Markdown pyinstaller

      - name: Build Windows EXE
        run: pyinstaller --noconsole --onefile --name "MarkdownViewer" --icon icon.ico app.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows Installer
        run: iscc installer.iss

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MarkdownViewer-Setup-*.exe
            dist/MarkdownViewer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-debian:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper

      - name: Build Debian Package
        run: dpkg-buildpackage -us -uc -b

      - name: Move Package
        run: mv ../markdown-viewer_*.deb ./markdown-viewer_1.0.1_all.deb

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: markdown-viewer_1.0.1_all.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          pacman -Syu --noconfirm base-devel git python python-pyqt6 python-pyqt6-webengine python-markdown

      - name: Build Arch Package
        run: |
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg -f"

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: markdown-viewer-*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
